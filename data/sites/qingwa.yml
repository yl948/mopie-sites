id: qingwa
name: 青蛙
domain: https://qingwapt.com/
encoding: UTF-8
config_url: https://raw.githubusercontent.com/yl948/mopie-sites/main/data/sites/qingwa.yml

login:
  test:
    selector: a[href="logout.php"]

category_mappings:
  - { id: 401, cate_level1: Movie, cate_level2: Movies, cate_level2_desc: "电影" }
  - { id: 402, cate_level1: TV, cate_level2: TV, cate_level2_desc: "剧集" }
  - { id: 403, cate_level1: TV, cate_level2: TV, cate_level2_desc: "综艺" }
  - { id: 404, cate_level1: Documentary, cate_level2: TV/Documentary, cate_level2_desc: "纪录片" }
  - { id: 405, cate_level1: Anime, cate_level2: TV/Anime, cate_level2_desc: "动漫" }
  - { id: 406, cate_level1: Music, cate_level2: Audio/Video, cate_level2_desc: "MV" }
  - { id: 407, cate_level1: TV, cate_level2: TV/Sport, cate_level2_desc: "体育" }
  - { id: 408, cate_level1: Music, cate_level2: Audio, cate_level2_desc: "音乐" }
  - { id: 412, cate_level1: TV, cate_level2: TV, cate_level2_desc: "短剧" }
  - { id: 409, cate_level1: Other, cate_level2: Other, cate_level2_desc: "其他" }

userinfo:
  path: https://qingwapt.com/index.php
  item:
    selector: table[id="info_block"]
  fields:
    uid:
      default_value: 0
      selector: a[href^="userdetails.php?id="]
      attribute: href
      filters:
        - name: re_search
          args: [ '\d+', 0 ]
    user_group:
      default_value: ''
      selector: a[href^="userdetails.php?id="]
      attribute: class
    username:
      default_value: '未知用户名'
      selector: a[href^="userdetails.php?id="]
    share_ratio:
      default_value: ''
      selector: font[class="color_ratio"]
      method: next_sibling
      filters:
        - name: replace
          args: [ '无限','inf' ]
    uploaded:
      default_value: 0
      selector: font[class="color_uploaded"]
      method: next_sibling
      filters:
        - name: replace
          args: [ '无限','inf' ]
    downloaded:
      default_value: 0
      selector: font[class="color_downloaded"]
      method: next_sibling
      filters:
        - name: replace
          args: [ '无限','inf' ]
    seeding:
      default_value: 0
      selector: img[alt="Torrents seeding"]
      method: next_sibling
    leeching:
      default_value: 0
      selector: img[alt="Torrents leeching"]
      method: next_sibling
    vip_group:
      case:
        a[class^="VIP"]: true
        "*": false

search:
  paths:
    - path: torrents.php
      method: get
  query:
    $raw: "{% for c in query.cates %}cat{{c}}=1&{% endfor %}"
    search: "{% if query.imdb_id %}{{query.imdb_id}}{%else%}{{query.keyword}}{% endif %}"
    incldead: 1
    spstate: "{% if query.free %}2{% else %}0{% endif %}"
    search_area: "{% if query.imdb_id %}4{% else %}0{%endif%}"
    search_mode: 0
    sort: "{{ query.sort }}"
    type: "{{ query.type }}"
    page: "{{ query.page }}"

torrents:
  list:
    selector: table.torrents > tr:has(td.rowfollow)
  fields:
    id:
      selector: td.embedded a[href^="download.php?id="]
      attribute: href
      filters:
        - name: re_search
          args: [ '\d+', 0 ]
    title_default:
      selector: td.embedded a[href^="details.php?id="]
    title_optional:
      optional: true
      selector: td.embedded a[title][href^="details.php?id="]
      attribute: title
    title:
      text: "{% if fields['title_optional'] %}{{ fields['title_optional'] }}{% else %}{{ fields['title_default'] }}{% endif %}"
    category:
      selector: td:first-child a[href^="?cat="]
      attribute: href
      filters:
        - name: replace
          args: [ "?", "" ]
        - name: querystring
          args: cat
    details:
      selector: td.embedded a[href^="details.php?id="]
      attribute: href
    download:
      selector: td.embedded a[href^="download.php?id="]
      attribute: href
    imdbid:
      selector: td.embedded img[alt="imdb"] + span
      optional: true
    size:
      selector: td.rowfollow:nth-child(5)
    date_added:
      selector: td.rowfollow:nth-child(4) > span[title]
      attribute: title
      optional: true
    seeders:
      selector: td.rowfollow a[href*="dllist=1#seeders"]
    leechers:
      selector: td.rowfollow a[href*="dllist=1#leechers"]
    snatched:
      selector: td.rowfollow a[href^="viewsnatches.php?id="]
